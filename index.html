    let currentFilter = 'all';
    let searchTerm = '';
    let openItems = new Set(); // 记录展开状态

    function getBadgeHtml(badge) {
        if (!badge) return '';
        return `<span class="sub-item-badge ${badge.cls}">${badge.text}</span>`;
    }

    function getTagClass(tag) {
        if (tag.includes('重要') || tag.includes('高优先')) return 'important';
        if (tag.includes('推荐')) return 'recommended';
        return 'normal';
    }

    function renderContent() {
        const container = document.getElementById('content');
        let html = '';
        let hasContent = false;

        data.forEach(day => {
            const filteredCards = day.cards.filter(card => {
                const matchFilter = currentFilter === 'all' || card.type === currentFilter;
                if (!matchFilter) return false;
                if (!searchTerm) return true;
                // 搜索：匹配标题或子条目label
                return card.title.includes(searchTerm) ||
                    card.items.some(it => it.label.includes(searchTerm) || (it.detail && it.detail.includes(searchTerm)));
            });

            if (filteredCards.length > 0) {
                hasContent = true;
                html += `<div class="date-group"><div class="date-header">📅 ${day.date}</div>`;

                filteredCards.forEach(card => {
                    const tagsHtml = card.tags.map(tag =>
                        `<span class="tag ${getTagClass(tag)}">${tag}</span>`
                    ).join('');

                    const itemsHtml = card.items.map((item, idx) => {
                        const itemKey = `${card.type}-${day.date}-${idx}`;
                        const isOpen = openItems.has(itemKey);
                        return `
                            <div class="sub-item">
                                <div class="sub-item-header ${isOpen ? 'active' : ''}" 
                                     data-key="${itemKey}" onclick="toggleItem(this, '${itemKey}')">
                                    <span class="sub-item-label">${item.label}</span>
                                    ${getBadgeHtml(item.badge)}
                                    <span class="sub-item-arrow">▼</span>
                                </div>
                                <div class="sub-item-body ${isOpen ? 'open' : ''}">
                                    <div class="sub-item-body-inner">
                                        ${item.detail}
                                        ${item.url ? `<a href="${item.url}" class="source-link" target="_blank">🔗 查看原文</a>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    html += `
                        <div class="card" data-type="${card.type}">
                            <div class="card-header">
                                <div class="card-icon ${card.type}">${card.icon}</div>
                                <div class="card-title">${card.title}</div>
                                <div class="card-time">${card.time}</div>
                            </div>
                            ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
                            <div class="items-list">${itemsHtml}</div>
                        </div>
                    `;
                });

                html += '</div>';
            }
        });

        if (!hasContent) {
            html = `<div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <p>暂无相关内容</p>
            </div>`;
        }

        container.innerHTML = html;
    }

    function toggleItem(headerEl, key) {
        const body = headerEl.nextElementSibling;
        const isOpen = openItems.has(key);

        if (isOpen) {
            openItems.delete(key);
            headerEl.classList.remove('active');
            body.classList.remove('open');
        } else {
            openItems.add(key);
            headerEl.classList.add('active');
            body.classList.add('open');
        }
    }

    // 筛选按钮
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderContent();
        });
    });

    // 搜索
    document.getElementById('searchInput').addEventListener('input', function() {
        searchTerm = this.value;
        renderContent();
    });

    renderContent();
    </script>
